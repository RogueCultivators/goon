name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run integration tests
      run: go test -v ./...

  build:
    name: Build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.21', '1.22', '1.23', '1.24', '1.25']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build -v ./...

    - name: Build binary (Unix)
      if: runner.os != 'Windows'
      run: go build -o goon ./

    - name: Build binary (Windows)
      if: runner.os == 'Windows'
      run: go build -o goon.exe ./

    - name: Test binary (Unix)
      if: runner.os != 'Windows'
      run: ./goon version

    - name: Test binary (Windows)
      if: runner.os == 'Windows'
      run: .\goon.exe version

  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [lint, test, integration-test, build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Analyze changes and determine version bump
      id: version_bump
      run: |
        # 获取最新的 tag，如果没有则使用 v0.0.0
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

        # 获取自上次tag以来的提交
        if [ "$LATEST_TAG" = "v0.0.0" ]; then
          COMMITS=$(git rev-list --count HEAD)
          FILES_CHANGED=$(git diff --name-only $(git rev-list --max-parents=0 HEAD) HEAD | wc -l)
        else
          COMMITS=$(git rev-list --count ${LATEST_TAG}..HEAD)
          FILES_CHANGED=$(git diff --name-only ${LATEST_TAG}..HEAD | wc -l)
        fi

        echo "Commits since last tag: $COMMITS"
        echo "Files changed: $FILES_CHANGED"

        # 解析版本号
        VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        # 判断是否为大更新 (超过10个文件变更或超过20个提交)
        if [ $FILES_CHANGED -gt 10 ] || [ $COMMITS -gt 20 ]; then
          echo "Large update detected, bumping minor version"
          MINOR=$((MINOR + 1))
          PATCH=0
          BUMP_TYPE="minor"
        else
          echo "Small update, bumping patch version"
          PATCH=$((PATCH + 1))
          BUMP_TYPE="patch"
        fi

        NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "commits_count=$COMMITS" >> $GITHUB_OUTPUT
        echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

        echo "Latest tag: $LATEST_TAG"
        echo "New tag: $NEW_TAG"
        echo "Bump type: $BUMP_TYPE"

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 创建发布说明
        RELEASE_NOTES="Auto release ${{ steps.version_bump.outputs.new_tag }}

        Version bump: ${{ steps.version_bump.outputs.bump_type }}
        Commits: ${{ steps.version_bump.outputs.commits_count }}
        Files changed: ${{ steps.version_bump.outputs.files_changed }}"

        git tag -a ${{ steps.version_bump.outputs.new_tag }} -m "$RELEASE_NOTES"
        git push origin ${{ steps.version_bump.outputs.new_tag }}

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v5
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

